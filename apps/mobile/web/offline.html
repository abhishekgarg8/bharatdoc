<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>BharatDoc Offline</title>
    <style>
      :root {
        background: #faf5ea;
        color: #1c1712;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        align-items: center;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: calc(32px + env(safe-area-inset-top)) 28px calc(32px + env(safe-area-inset-bottom));
      }

      main {
        max-width: 430px;
      }

      .mark {
        align-items: center;
        background: #c24a2a;
        border-radius: 18px;
        color: #faf5ea;
        display: flex;
        font-family: Georgia, serif;
        font-size: 40px;
        font-style: italic;
        height: 72px;
        justify-content: center;
        width: 72px;
      }

      h1 {
        font-family: Georgia, serif;
        font-size: 40px;
        font-style: italic;
        line-height: 1;
        margin: 28px 0 12px;
      }

      p {
        color: #6f6354;
        font-size: 16px;
        line-height: 1.55;
        margin: 0 0 20px;
      }

      button {
        appearance: none;
        background: #c24a2a;
        border: 0;
        border-radius: 16px;
        color: #fff;
        font: inherit;
        font-weight: 700;
        min-height: 52px;
        padding: 0 22px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">B</div>
      <h1>Connection needed</h1>
      <p>BharatDoc could not reach the secure production app. Check your internet connection and try again.</p>
      <button type="button" onclick="location.href='https://bharatdoc-web.vercel.app/'">Retry</button>
    </main>
  </body>
</html>
