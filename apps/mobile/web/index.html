<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BharatDoc</title>
    <meta http-equiv="refresh" content="0; url=https://bharatdoc-web.vercel.app/" />
    <style>
      :root {
        color: #1c1712;
        background: #faf5ea;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        align-items: center;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 420px;
      }

      .mark {
        align-items: center;
        background: #c24a2a;
        border-radius: 18px;
        color: #faf5ea;
        display: flex;
        font-family: Georgia, serif;
        font-size: 40px;
        font-style: italic;
        height: 72px;
        justify-content: center;
        width: 72px;
      }

      h1 {
        font-family: Georgia, serif;
        font-size: 40px;
        font-style: italic;
        line-height: 1;
        margin: 28px 0 12px;
      }

      p {
        color: #6f6354;
        font-size: 16px;
        line-height: 1.55;
        margin: 0;
      }

      a {
        color: #9b3a25;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">B</div>
      <h1>BharatDoc</h1>
      <p>Opening the secure BharatDoc app. If it does not open, <a href="https://bharatdoc-web.vercel.app/">continue in your browser</a>.</p>
    </main>
  </body>
</html>
