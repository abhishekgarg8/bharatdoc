version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      next-runtime:
        patterns:
          - next
          - react
          - react-dom
          - "@types/react*"
      supabase:
        patterns:
          - "@supabase/*"
      production-runtime:
        dependency-type: production
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Etc/UTC
    commit-message:
      prefix: deps
