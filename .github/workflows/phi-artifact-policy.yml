name: PHI artifact policy
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  tracked-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
      - run: node scripts/check-phi-artifacts.mjs
